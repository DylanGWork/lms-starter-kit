version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lms_starter_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lms_secret}
      POSTGRES_DB: ${POSTGRES_DB:-lms_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lms}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: lms_starter_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lms}:${POSTGRES_PASSWORD:-lms_secret}@postgres:5432/${POSTGRES_DB:-lms_platform}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change_this_in_production_please}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_URL_INTERNAL: ${NEXTAUTH_URL_INTERNAL:-http://127.0.0.1:3000}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      UPLOAD_DIR: /app/uploads
      NODE_ENV: ${NODE_ENV:-production}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: lms_starter_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    profiles:
      - proxy

volumes:
  postgres_data:
  uploads_data:
